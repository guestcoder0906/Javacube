
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Seed Scanner</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #4CAF50;
            margin-bottom: 30px;
        }
        .input-group {
            background-color: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 200px;
            background-color: #333;
            color: #fff;
            border: 1px solid #4CAF50;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 10px;
            font-family: monospace;
        }
        .results {
            background-color: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        #resultsBox {
            width: 100%;
            height: 300px;
            background-color: #333;
            color: #fff;
            border: 1px solid #4CAF50;
            border-radius: 4px;
            padding: 10px;
            font-family: monospace;
            resize: vertical;
        }
        .button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
        }
        .button:hover {
            background-color: #45a049;
        }
        .button.clear {
            background-color: #f44336;
        }
        .button.clear:hover {
            background-color: #da190b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Minecraft Seed Scanner</h1>
        
        <div class="input-group">
            <h2>Parameters</h2>
            <textarea id="params" placeholder="Enter your parameters here...">===== Scanning options =====
Starting seed: 0
Search radius: 1000
Use spawn: false
Custom z: 0
Custom x: 0</textarea>
            <button class="button" onclick="startScan()">Start Scan</button>
            <button class="button clear" onclick="clearResults()">Clear Results</button>
        </div>

        <div class="results">
            <h2>Results</h2>
            <textarea id="resultsBox" readonly></textarea>
        </div>
    </div>

    <script>
        let ws;
        
        function connect() {
            ws = new WebSocket('ws://' + window.location.host + '/ws');
            ws.onmessage = function(event) {
                const resultsBox = document.getElementById('resultsBox');
                resultsBox.value += event.data + '\n';
                resultsBox.scrollTop = resultsBox.scrollHeight;
            };
            ws.onclose = function() {
                setTimeout(connect, 1000);
            };
        }

        function startScan() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const params = document.getElementById('params').value;
                ws.send(params);
            }
        }

        function clearResults() {
            document.getElementById('resultsBox').value = '';
        }

        connect();
    </script>
</body>
</html>
